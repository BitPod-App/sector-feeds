name: Mallers Weekly Fetch

on:
  schedule:
    - cron: "15 3 * * 2"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mallers-weekly-fetch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mallers-weekly-fetch:
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      BITPOD_PUBLIC_PERMALINK_BASE_URL: https://permalinks.bitpod.app
      WEEKLY_GPT_REPORT: "0"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      PERMALINKS_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || secrets.CLOUDFLARE_PAGES_PROJECT_NAME || 'bitpod-public-permalinks' }}
      PERMALINKS_SHOW_KEY: jack_mallers_show
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create runtime venv
        run: |
          python -m venv .venv311
          .venv311/bin/pip install --upgrade pip
          .venv311/bin/pip install -e .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run weekly Mallers fetch
        run: bash scripts/run_mallers_weekly.sh

      - name: Refresh permalink bundle from latest local status
        run: python3 scripts/refresh_public_permalinks.py jack_mallers_show

      - name: Check Cloudflare deploy readiness
        id: cloudflare
        run: |
          missing=()
          [ -n "$CLOUDFLARE_API_TOKEN" ] || missing+=("CLOUDFLARE_API_TOKEN")
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || missing+=("CLOUDFLARE_ACCOUNT_ID")
          if [ "${#missing[@]}" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "project_name=${PERMALINKS_PROJECT_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'missing_names=%s\n' "$(IFS=,; echo "${missing[*]}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy refreshed permalink bundle
        if: steps.cloudflare.outputs.ready == 'true'
        run: bash scripts/deploy_public_permalinks_pages.sh "$PERMALINKS_PROJECT_NAME" main "$PERMALINKS_SHOW_KEY"

      - name: Note skipped permalink deploy
        if: steps.cloudflare.outputs.ready != 'true'
        run: |
          echo "::warning::Skipping public permalink deploy; missing GitHub Actions config: ${{ steps.cloudflare.outputs.missing_names }}"

      - name: Upload weekly fetch artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mallers-weekly-fetch-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            transcripts/jack_mallers_show/**
            artifacts/public/permalinks/**
            artifacts/private/public_permalink_manifest.json
            artifacts/gpt-qa/**
            artifacts/runs/**
            index/processed.json

      - name: Commit updated Mallers artifacts
        run: |
          if git diff --quiet -- transcripts/jack_mallers_show index/processed.json; then
            echo "No tracked artifact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add transcripts/jack_mallers_show index/processed.json
          git commit -m "chore: refresh mallers weekly artifacts"
          git push origin HEAD:main
