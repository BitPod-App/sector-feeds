name: Deploy public permalinks

on:
  push:
    branches: [main]
    paths:
      - "bitpod/**"
      - "cloudflare/permalinks-worker/**"
      - "index/processed.json"
      - "scripts/deploy_public_permalinks_pages.sh"
      - "scripts/refresh_public_permalinks.py"
      - "scripts/verify_public_permalink_bundle.py"
      - "shows.json"
      - "transcripts/**"
      - ".github/workflows/deploy-public-permalinks.yml"
  workflow_dispatch:

concurrency:
  group: deploy-public-permalinks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      BITPOD_PUBLIC_PERMALINK_BASE_URL: https://permalinks.bitpod.app
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PERMALINKS_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
      PERMALINKS_SHOW_KEY: jack_mallers_show
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package
        run: python -m pip install --upgrade pip && pip install -e .

      - name: Validate Cloudflare configuration
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN secret"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID secret"; exit 1; }
          test -n "$PERMALINKS_PROJECT_NAME" || { echo "Missing CLOUDFLARE_PAGES_PROJECT_NAME secret"; exit 1; }

      - name: Deploy permalink bundle to Cloudflare Pages
        run: bash scripts/deploy_public_permalinks_pages.sh "$PERMALINKS_PROJECT_NAME" main "$PERMALINKS_SHOW_KEY"
